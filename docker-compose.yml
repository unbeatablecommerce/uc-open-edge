name: uc-open-edge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ucedge
      POSTGRES_USER: ucedge
      POSTGRES_PASSWORD: ucedge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ucedge -d ucedge']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - '${API_PORT:-3001}:3001'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ucedge:ucedge@postgres:5432/ucedge
      SESSION_SECRET: ${SESSION_SECRET}
      API_PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: http://localhost:${ADMIN_PORT:-3000}
      FILE_DROP_ROOT: /data/file-drop
    volumes:
      - file_drop_data:/data/file-drop
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ucedge:ucedge@postgres:5432/ucedge
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FILE_DROP_ROOT: /data/file-drop
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
    volumes:
      - file_drop_data:/data/file-drop
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
    restart: unless-stopped
    ports:
      - '${ADMIN_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      API_URL: http://api:3001
      ORIGIN: http://localhost:${ADMIN_PORT:-3000}
    depends_on:
      - api
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional MQTT broker — enable with: docker compose --profile mqtt up
  mosquitto:
    image: eclipse-mosquitto:2
    profiles: ['mqtt']
    restart: unless-stopped
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data

  # Optional event simulator — enable with: docker compose --profile simulator up
  simulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.simulator
    profiles: ['simulator']
    environment:
      API_URL: http://api:3001
    depends_on:
      - api

volumes:
  postgres_data:
  file_drop_data:
  mosquitto_data:
